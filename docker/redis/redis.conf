# =============================================================================
# EVO CAMPAIGN - REDIS CONFIGURATION
# =============================================================================

# Basic settings
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Memory and persistence
maxmemory 512mb
maxmemory-policy allkeys-lru
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Security (for development)
# requirepass your_password_here
protected-mode no

# Performance
tcp-backlog 511
databases 16

# Append only file
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client settings
maxclients 10000